<div class="login-container">
  <div class="login-card">
    
    <!-- EL LOGO HA SIDO ELIMINADO COMPLETAMENTE -->

    <header class="card-header">
      <h1>Urban Studio</h1>
      <p class="subtitle">Gestión inteligente para barberías</p>
    </header>

    <form (ngSubmit)="login()" class="login-form">
      
      <div class="input-group">
        <label for="username">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Usuario
        </label>
        <input 
          type="text" 
          id="username"
          placeholder="Ingresa tu usuario" 
          [(ngModel)]="username"
          name="username"
          required
          autocomplete="username"
        >
      </div>

      <div class="input-group">
        <label for="password">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Contraseña
        </label>
        <input 
          type="password" 
          id="password"
          placeholder="••••••••" 
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="current-password"
        >
      </div>

      <div *ngIf="mensaje" class="alert-message" [ngClass]="{'alert-success': mensaje.includes('correcto'), 'alert-error': !mensaje.includes('correcto')}">
        <svg class="alert-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4M12 16h.01"/>
        </svg>
        {{ mensaje }}
      </div>

      <div class="actions-group">
        <button type="submit" class="btn btn-primary">
          <span>Iniciar sesión</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
        
        <button type="button" class="btn btn-secondary" (click)="irRegistro()">
          Crear cuenta
        </button>
      </div>

      <div class="divider">
        <span>Acceso seguro</span>
      </div>
      
      <p class="security-notice">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Conexión segura • Tus datos están protegidos
      </p>

    </form>
  </div>
</div>
