<div class="login-container">
  <div class="login-card">
    
    <div class="logo-container">
      <div class="logo">✂</div>
    </div>

    <header class="card-header">
      <h1>Urban Studio</h1>
      <p class="subtitle">Gestión inteligente para barberías</p>
    </header>

    <form (ngSubmit)="login()" class="login-form">
      
      <div class="input-group">
        <label for="username">Usuario</label>
        <input 
          type="text" 
          id="username"
          placeholder="Ingresa tu usuario" 
          [(ngModel)]="username"
          name="username"
          required
        >
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password"
          placeholder="Ingresa tu contraseña" 
          [(ngModel)]="password"
          name="password"
          required
        >
      </div>

      <div *ngIf="mensaje" class="alert-message" [ngClass]="{'alert-success': mensaje.includes('correcto'), 'alert-error': !mensaje.includes('correcto')}">
        {{ mensaje }}
      </div>

      <div class="actions-group">
        <button type="submit" class="btn btn-primary">
          Iniciar sesión
        </button>
        
        <button type="button" class="btn btn-secondary" (click)="irRegistro()">
          Crear cuenta
        </button>
      </div>

    </form>
  </div>
</div>
