<div class="register-container">
    <div class="card">
        <header class="card-header">
            <h1>Crear Cuenta</h1>
            <p class="subtitle">Regístrate para gestionar tus citas y servicios</p>
        </header>

        <form (ngSubmit)="registrar()" #registerForm="ngForm" class="register-form">
            
            <div class="input-group">
                <label for="username">Nombre de usuario</label>
                <input 
                    type="text" 
                    id="username"
                    placeholder="Ej. jason_moreno" 
                    [(ngModel)]="username" 
                    name="username"
                    required
                >
            </div>

            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input 
                    type="email" 
                    id="email"
                    placeholder="correo@ejemplo.com" 
                    [(ngModel)]="email" 
                    name="email"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password"
                    placeholder="••••••••" 
                    [(ngModel)]="password" 
                    name="password"
                    required
                >
            </div>

            <div *ngIf="mensaje" class="alert-message" [ngClass]="{'alert-success': mensaje.includes('correctamente'), 'alert-error': !mensaje.includes('correctamente')}">
                {{ mensaje }}
            </div>

            <div class="actions-group">
                <button type="submit" class="btn btn-primary">
                    Registrarme
                </button>
                
                <button type="button" class="btn btn-secondary" (click)="volverLogin()">
                    Volver al Login
                </button>
            </div>

        </form>
    </div>
</div>
